<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Financement des campagnes de votations suisses - Données officielles du CDF/EFK">
    <meta name="theme-color" content="#1C1C1E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Financement Campagnes">
    
    <title>💰 Financement des Campagnes</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>💰 <span id="app-title">Financement des campagnes</span></h1>
                <div class="language-selector">
                    <button class="lang-btn active" data-lang="fr">FR</button>
                    <button class="lang-btn" data-lang="de">DE</button>
                    <button class="lang-btn" data-lang="it">IT</button>
                </div>
            </div>
            <div class="vote-date-container">
                <span class="vote-label" id="vote-label">Votations</span>
                <span class="vote-date" id="vote-date">-</span>
            </div>
        </header>

        <main id="votations-container">
            <div class="loading">
                <div class="spinner"></div>
                <p id="loading-text">Chargement des données...</p>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <div class="source">
                    <span>Source: <a href="https://politikfinanzierung.efk.admin.ch" target="_blank" rel="noopener" id="source-link">CDF</a></span>
                </div>
                <div class="update-info">
                    <span id="update-label">Mise à jour</span>: <span id="last-update">-</span>
                </div>
            </div>
            <div class="install-prompt" id="install-prompt">
                <button id="install-btn">
                    <span>📱</span>
                    <span id="install-text">Installer l'application</span>
                </button>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
