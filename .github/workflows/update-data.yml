name: Update Campaign Finance Data

on:
  schedule:
    # 3x par jour : 9h, 14h et 22h (heure suisse UTC+1)
    - cron: '0 8 * * *'   # 9h Suisse
    - cron: '0 13 * * *'  # 14h Suisse
    - cron: '0 21 * * *'  # 22h Suisse
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scraper
        run: python scraper.py
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          git diff --staged --quiet || git commit -m "🔄 Mise à jour des données de financement - $(date +'%Y-%m-%d %H:%M')"
          git push
